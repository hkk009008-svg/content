# pipeline_status.toml — living pipeline-capability manifest (state-view Increment 2)
#
# The verifier-validated, drift-proof replacement for the static
# "implemented-but-unutilized catalog" (§10 of the comprehensive-test brief).
#
# Each [[component]] declares a capability + its current utilization status +
# a code anchor. The anchor is `file:SYMBOL` (NOT file:line) on purpose: symbol
# names survive line shifts, so this manifest does NOT drift when unrelated code
# moves. `scripts/check_doc_claims.py` (check_manifest) validates every anchor —
# if the named symbol no longer exists, the claim is flagged (a stale "X → symbol"
# claim can't survive silently). `scripts/status.py` renders this grouped by status.
#
# status enum:
#   live    — always runs in the default production path
#   wired   — reachable/works when its flag/condition is on (opt-in)
#   stubbed — code exists but is never effectively reached (dead toggle, no-op
#             return, zero callers) — a candidate to wire
#   parked  — implemented but blocked on external state (e.g. GPU pod / node install)
#   dead    — confirmed dead; removal candidate
#
# Adding an entry: pick a stable `def`/`class`/module-const SYMBOL as the anchor
# and run `.venv/bin/python scripts/check_doc_claims.py` (or status.py) to confirm
# it resolves. Grows over time; v1 is a verified starter, not exhaustive.

