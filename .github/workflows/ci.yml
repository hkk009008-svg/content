# Landed per the 2026-05-24 handoff. Three independent jobs run in parallel;
# all must pass for the workflow to succeed. Mirrors the three local checks
# documented in ARCHITECTURE.md §15 + OPERATIONS.md §7. Concurrency cancels
# older runs on the same branch (saves minutes on rapid pushes).
#
# 2026-06-10 (STRATEGIC_REVIEW-2026-06-10 P0-1 / NF-1): the pytest job was
# 0-for-289 since landing — bare `pytest` cannot import root modules
# (cost_tracker, …) at collection time. The fix lives in pyproject.toml
# ([tool.pytest.ini_options] pythonpath = ["."]), not in this file. Action
# majors bumped to Node-24 runtimes ahead of GitHub's 2026-06-16 forcing.
#
# Scope intentionally NOT included (per the 2026-05-24 Session 1 brief):
#   - Linting (ruff, eslint)
#   - Deployment workflows
#   - Auto-publish, releases, changelogs
#   - Code coverage reporting
#   - Matrix builds
#
# Baseline as of 2026-06-10 (bare pytest — the CI invocation shape):
#   - pytest tests/unit/: local 1982 passed; CI-shape (archive + dummy
#     keys, no .env, no projects/) 1981 passed + 1 skipped (the skip is a
#     real-project-fixture test that self-skips when projects/ is absent)
#   - tsc --noEmit: silent exit
#   - §15 smoke: OK
#
# Security review (per .claude security_reminder_hook):
#   - No untrusted-input interpolation in `run:` blocks.
#   - Only `${{ github.workflow }}` + `${{ github.ref }}` in `concurrency:`
#     group key, which is the canonical GitHub pattern; ref is not used in
#     any shell command.
#   - No reference to github.event.*, github.head_ref, or commit messages.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ARCHITECTURE.md §15 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      # DeepFace lazy-downloads GhostFaceNet weights (~700MB) on first
      # validator construction. Cache them across runs so first run is slow
      # but subsequent runs are fast.
      - name: Cache DeepFace weights
        uses: actions/cache@v5
        with:
          path: ~/.deepface
          key: deepface-weights-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run §15 singleton + ctx-plumbing invariants
        # Single source of truth: scripts/ci_smoke.py.
        # If invariants change, update that script + ARCHITECTURE.md §15's
        # prose list together — no other file inlines the smoke block.
        run: python scripts/ci_smoke.py

  pytest-unit:
    name: pytest tests/unit/
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      # The unit suite asserts keys-PRESENT behavior: llm/ensemble.py
      # constructs openai.OpenAI() at __init__ (hard OpenAIError keyless,
      # 49F+1E on a bare runner), its gemini branch flips judge-map
      # behavior on key presence, and the phase-C vision-identity path
      # branches on ANTHROPIC_API_KEY presence (6F without it). Local runs
      # get real keys from .env; CI gets inert placeholders so the suite
      # exercises the same configuration. No test calls the network
      # (offline suite, ~1 min). Hermeticity refactor (lazy/injectable
      # LLMEnsemble) is a named follow-up per the adversarial review of
      # docs/STRATEGIC_REVIEW-2026-06-10.md Session 1.
      OPENAI_API_KEY: ci-dummy-not-a-real-key
      GEMINI_API_KEY: ci-dummy-not-a-real-key
      ANTHROPIC_API_KEY: ci-dummy-not-a-real-key
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Cache DeepFace weights
        uses: actions/cache@v5
        with:
          path: ~/.deepface
          key: deepface-weights-v1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest tests/unit/
        # tests/integration/ requires real cloud credentials and must NOT run
        # in CI. Baseline 2026-06-10: 1981 passed + 1 skipped here (1982
        # locally — the delta is one real-project-fixture self-skip).
        # If your PR changes this count, the diff or the brief explains why.
        # Root-module importability comes from [tool.pytest.ini_options]
        # pythonpath in pyproject.toml — bare `pytest` here relies on it.
        run: pytest tests/unit/ --tb=short -q

  tsc:
    name: TypeScript --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install npm deps
        working-directory: web
        run: npm ci

      - name: TypeScript noEmit check
        working-directory: web
        run: npx tsc --noEmit
